<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f5efe8"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#d4af7f"/>
  <!-- Right accent bar -->
  <rect x="1192" y="0" width="8" height="630" fill="#d4af7f"/>
  <!-- Top decorative line -->
  <line x1="60" y1="180" x2="1140" y2="180" stroke="#d4af7f" stroke-width="1"/>
  <!-- Bottom decorative line -->
  <line x1="60" y1="450" x2="1140" y2="450" stroke="#d4af7f" stroke-width="1"/>
  <!-- Brand name -->
  <text
    x="600"
    y="305"
