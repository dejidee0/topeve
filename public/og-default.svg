    font-weight="700"
    fill="#5b3a2e"
    text-anchor="middle"
    letter-spacing="12"
  >TOPEVE</text>
  <!-- Sub-word -->
  <text
    x="600"
    y="375"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="400"
    fill="#d4af7f"
